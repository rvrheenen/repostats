{% extends "base.html" %}
{% block content %}
<header class="top-bar">
    <h1 class="logo">RepoStats</h1>
    <div class="top-bar-right">
        <div id="scan-status">
        {% include "partials/scan_status.html" %}
        </div>
    </div>
</header>

<div class="layout">
    <aside class="sidebar">
        <form id="filter-form"
              hx-post="/api/aggregate"
              hx-target="#dashboard-content"
              hx-swap="innerHTML"
              hx-trigger="change"
              hx-indicator="#loading">

            <div class="sidebar-section">
                <h3 class="sidebar-heading">Time Range</h3>
                <select name="time_range" class="time-select">
                    <optgroup label="Recent">
                        <option value="7d"   {% if time_range == '7d'   %}selected{% endif %}>7 days</option>
                        <option value="14d"  {% if time_range == '14d'  %}selected{% endif %}>14 days</option>
                        <option value="30d"  {% if time_range == '30d'  %}selected{% endif %}>30 days</option>
                        <option value="90d"  {% if time_range == '90d'  %}selected{% endif %}>90 days</option>
                        <option value="180d" {% if time_range == '180d' %}selected{% endif %}>6 months</option>
                    </optgroup>
                    <optgroup label="Long-term">
                        <option value="1y"  {% if time_range == '1y'  %}selected{% endif %}>1 year</option>
                        <option value="2y"  {% if time_range == '2y'  %}selected{% endif %}>2 years</option>
                        <option value="3y"  {% if time_range == '3y'  %}selected{% endif %}>3 years</option>
                        <option value="5y"  {% if time_range == '5y'  %}selected{% endif %}>5 years</option>
                        <option value="all" {% if time_range == 'all' %}selected{% endif %}>All time</option>
                    </optgroup>
                    {% if available_years %}
                    <optgroup label="Year">
                        {% for year in available_years %}
                        <option value="y{{ year }}" {% if time_range == 'y' ~ year|string %}selected{% endif %}>{{ year }}</option>
                        {% endfor %}
                    </optgroup>
                    {% endif %}
                </select>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-heading">Repositories</h3>
                <div class="sidebar-actions">
                    <button type="button" class="btn-sm" onclick="selectAllRepos(true)">All</button>
                    <button type="button" class="btn-sm" onclick="selectAllRepos(false)">None</button>
                    <button type="button" class="btn-sm" onclick="selectDefaultRepos()">Default</button>
                </div>
                <script type="application/json" id="default-repos-data">{{ default_repos | tojson }}</script>
                {% for repo in all_repos %}
                <label class="repo-checkbox">
                    <input type="checkbox" name="repos" value="{{ repo }}"
                        {% if repo in selected_repos %}checked{% endif %}>
                    <span>{{ repo }}</span>
                </label>
                {% endfor %}
            </div>
        </form>
    </aside>

    <main>
        <div id="loading" class="htmx-indicator">Loading...</div>
        <div id="dashboard-content">
        {% include "partials/dashboard_content.html" %}
        </div>
    </main>
</div>
{% endblock %}
