<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoStats</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
</head>
<body>
{% block content %}{% endblock %}
<script>
/* ------------------------------------------------------------------ */
/*  Chart.js helpers                                                   */
/* ------------------------------------------------------------------ */
const COLORS = [
    '#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6',
    '#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'
];
const charts = {};

function destroyChart(id) {
    if (charts[id]) {
        if (charts[id]._pendingClickTimer) clearTimeout(charts[id]._pendingClickTimer);
        charts[id].destroy();
        delete charts[id];
    }
}

function readJSON(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    try { return JSON.parse(el.textContent); } catch { return null; }
}

/* ---- Legend double-click-to-isolate helper ---- */
function legendDoubleClickHandler(chart, dblClickDelay) {
    let lastClick = 0;
    let lastIndex = -1;
    let clickTimer = null;

    return function(e, legendItem, legend) {
        const index = legendItem.datasetIndex;
        const now = Date.now();
        const isDblClick = (index === lastIndex && now - lastClick < dblClickDelay);

        lastClick = now;
        lastIndex = index;

        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; chart._pendingClickTimer = null; }

        if (isDblClick) {
            /* Double-click: isolate this dataset or restore all */
            const datasets = chart.data.datasets;
            const onlyThisVisible = datasets.every((_, i) =>
                i === index ? chart.isDatasetVisible(i) : !chart.isDatasetVisible(i)
            );

            if (onlyThisVisible) {
                /* Already isolated — show all */
                datasets.forEach((_, i) => chart.setDatasetVisibility(i, true));
            } else {
                /* Isolate: hide everything except clicked */
                datasets.forEach((_, i) => chart.setDatasetVisibility(i, i === index));
            }
            chart.update();
        } else {
            /* Delay single-click to avoid firing on double-click */
            clickTimer = setTimeout(() => {
                clickTimer = null;
                chart._pendingClickTimer = null;
                if (!chart.canvas) return;  /* chart was destroyed */
                chart.setDatasetVisibility(index, !chart.isDatasetVisible(index));
                chart.update();
            }, dblClickDelay);
            chart._pendingClickTimer = clickTimer;
        }
    };
}

/* ---- Commit Timeline (stacked bar) ---- */
function initTimeline() {
    const data = readJSON('timeline-data');
    const canvas = document.getElementById('timeline-chart');
    if (!data || !data.length || !canvas) return;
    destroyChart('timeline');

    const periods = [...new Set(data.map(d => d.period))].sort();
    const repos   = [...new Set(data.map(d => d.repo))];
    const lookup  = {};
    data.forEach(d => { lookup[d.period + '|' + d.repo] = d.commits; });

    const chartInstance = new Chart(canvas, {
        type: 'bar',
        data: {
            labels: periods,
            datasets: repos.map((repo, i) => ({
                label: repo,
                data: periods.map(p => lookup[p + '|' + repo] || 0),
                backgroundColor: COLORS[i % COLORS.length],
            }))
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'top',
                    onClick: null  /* replaced after construction */
                },
                zoom: {
                    zoom: {
                        drag: { enabled: true, backgroundColor: 'rgba(59,130,246,0.15)', borderColor: '#3b82f6', borderWidth: 1 },
                        mode: 'x',
                        onZoomComplete: function({chart}) {
                            const btn = document.getElementById('timeline-reset-zoom');
                            if (btn) btn.style.display = chart.isZoomedOrPanned() ? '' : 'none';
                        }
                    },
                    limits: { x: { minRange: 2 } },
                }
            },
            scales: {
                x: { stacked: true, ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 30 } },
                y: { stacked: true, beginAtZero: true }
            }
        }
    });

    /* Wire up double-click handler now that we have the instance */
    chartInstance.options.plugins.legend.onClick = legendDoubleClickHandler(chartInstance, 300);
    charts['timeline'] = chartInstance;
}

/* ---- Commit Heatmap (HTML grid) ---- */
function initHeatmap() {
    const data = readJSON('heatmap-data');
    const container = document.getElementById('heatmap-grid');
    if (!data || !container) return;

    const grid = {};
    let maxCount = 0;
    data.forEach(d => {
        const key = d.day_of_week + ',' + d.hour;
        grid[key] = d.count;
        if (d.count > maxCount) maxCount = d.count;
    });

    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    let html = '<div class="hm-row hm-header"><span class="hm-label"></span>';
    for (let h = 0; h < 24; h++) html += '<span class="hm-hour">' + h + '</span>';
    html += '</div>';

    days.forEach((day, di) => {
        html += '<div class="hm-row"><span class="hm-label">' + day + '</span>';
        for (let h = 0; h < 24; h++) {
            const count = grid[di + ',' + h] || 0;
            const t = maxCount > 0 ? count / maxCount : 0;
            const bg = t === 0 ? 'var(--hm-0)' :
                       t < 0.25 ? 'var(--hm-1)' :
                       t < 0.5  ? 'var(--hm-2)' :
                       t < 0.75 ? 'var(--hm-3)' : 'var(--hm-4)';
            html += '<span class="hm-cell" style="background:' + bg + '" title="' +
                    day + ' ' + h + ':00 — ' + count + ' commits"></span>';
        }
        html += '</div>';
    });
    container.innerHTML = html;
}

/* ---- Language Breakdown (horizontal bar) ---- */
function initLanguageChart() {
    const data = readJSON('language-data');
    const canvas = document.getElementById('language-chart');
    if (!data || !data.length || !canvas) return;
    destroyChart('language');

    charts['language'] = new Chart(canvas, {
        type: 'bar',
        data: {
            labels: data.map(d => d.language),
            datasets: [{
                label: 'Lines of Code',
                data: data.map(d => d.code),
                backgroundColor: data.map((_, i) => COLORS[i % COLORS.length]),
            }]
        },
        options: {
            indexAxis: 'y', responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { beginAtZero: true } },
            onClick(e) {
                const els = charts['language'].getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
                if (!els.length) return;
                const lang = charts['language'].data.labels[els[0].index];
                if (lang) toggleLanguageDetail(lang);
            }
        }
    });
}

/* ---- Language Detail Toggle ---- */
let _activeLang = null;
let _pendingLang = null;

function toggleLanguageDetail(lang) {
    const panel = document.getElementById('lang-detail');
    if (!panel) return;

    /* Toggle off if clicking the same language */
    if (_activeLang === lang) {
        panel.classList.remove('open');
        panel.innerHTML = '<span class="lang-detail-loading htmx-indicator">Loading...</span>';
        _setActiveLangRow(null);
        _activeLang = null;
        return;
    }

    _setActiveLangRow(lang);
    _activeLang = lang;
    _pendingLang = lang;

    /* Show loading indicator */
    panel.innerHTML = '<span class="lang-detail-loading" style="display:block">Loading...</span>';
    panel.classList.add('open');

    /* Collect checked repos from the filter form */
    const form = document.getElementById('filter-form');
    const formData = new FormData();
    formData.append('language', lang);
    if (form) {
        form.querySelectorAll('input[name="repos"]:checked').forEach(cb => {
            formData.append('repos', cb.value);
        });
    }

    fetch('/api/language-detail', { method: 'POST', body: formData })
        .then(r => r.text())
        .then(html => {
            /* Discard stale response */
            if (_pendingLang !== lang) return;
            panel.innerHTML = html;
            panel.classList.add('open');
            initSortable();
        });
}

function _setActiveLangRow(lang) {
    document.querySelectorAll('#lang-detail-table tr[data-lang]').forEach(row => {
        row.classList.toggle('lang-row-active', row.dataset.lang === lang);
    });
}

function initLanguageDetailToggle() {
    const table = document.getElementById('lang-detail-table');
    if (!table || table.dataset.langBound) return;
    table.dataset.langBound = '1';

    table.addEventListener('click', (e) => {
        const row = e.target.closest('tr[data-lang]');
        if (!row) return;
        toggleLanguageDetail(row.dataset.lang);
    });
}

/* ---- Contributor Detail Toggle ---- */
let _activeContributor = null;
let _pendingContributor = null;

function toggleContributorDetail(author) {
    const panel = document.getElementById('contributor-detail');
    if (!panel) return;

    /* Toggle off if clicking the same contributor */
    if (_activeContributor === author) {
        panel.classList.remove('open');
        panel.innerHTML = '';
        _setActiveContribRow(null);
        _activeContributor = null;
        return;
    }

    _setActiveContribRow(author);
    _activeContributor = author;
    _pendingContributor = author;

    /* Show loading indicator */
    panel.innerHTML = '<span class="contrib-detail-loading" style="display:block">Loading\u2026</span>';
    panel.classList.add('open');

    /* Collect checked repos and time_range from the filter form */
    const form = document.getElementById('filter-form');
    const formData = new FormData();
    formData.append('author', author);
    if (form) {
        form.querySelectorAll('input[name="repos"]:checked').forEach(cb => {
            formData.append('repos', cb.value);
        });
        const sel = form.querySelector('select[name="time_range"]');
        if (sel) formData.append('time_range', sel.value);
    }

    fetch('/api/contributor-detail', { method: 'POST', body: formData })
        .then(r => r.text())
        .then(html => {
            /* Discard stale response */
            if (_pendingContributor !== author) return;
            panel.innerHTML = html;
            panel.classList.add('open');
            initContribDetailCharts();
            initSortable();
        });
}

function _setActiveContribRow(author) {
    const table = document.getElementById('contributor-table');
    if (!table) return;
    table.querySelectorAll('tbody tr[data-author]').forEach(row => {
        row.classList.toggle('contrib-row-active', row.dataset.author === author);
    });
}

function initContribDetailCharts() {
    const dataEl = document.getElementById('contrib-timeline-data');
    const canvas = document.getElementById('contrib-timeline-chart');
    if (!dataEl || !canvas) return;

    let data;
    try { data = JSON.parse(dataEl.textContent); } catch { return; }
    if (!data || !data.length) return;

    destroyChart('contrib-timeline');

    charts['contrib-timeline'] = new Chart(canvas, {
        type: 'bar',
        data: {
            labels: data.map(d => d.period),
            datasets: [{
                label: 'Commits',
                data: data.map(d => d.commits),
                backgroundColor: '#3b82f6',
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
}

function initContributorDetailToggle() {
    const table = document.getElementById('contributor-table');
    if (!table || table.dataset.contribDetailBound) return;
    table.dataset.contribDetailBound = '1';

    table.addEventListener('click', (e) => {
        const row = e.target.closest('tr[data-author]');
        if (!row) return;
        toggleContributorDetail(row.dataset.author);
    });
}

/* ---- Repo Detail Toggle ---- */
let _activeRepo = null;
let _pendingRepo = null;

function toggleRepoDetail(repo) {
    const panel = document.getElementById('repo-detail');
    if (!panel) return;

    /* Toggle off if clicking the same repo */
    if (_activeRepo === repo) {
        panel.classList.remove('open');
        panel.innerHTML = '<span class="repo-detail-loading">Loading...</span>';
        _setActiveRepoRow(null);
        _activeRepo = null;
        return;
    }

    _setActiveRepoRow(repo);
    _activeRepo = repo;
    _pendingRepo = repo;

    /* Show loading indicator */
    panel.innerHTML = '<span class="repo-detail-loading" style="display:block">Loading...</span>';
    panel.classList.add('open');

    /* Collect time_range from sidebar */
    const form = document.getElementById('filter-form');
    const formData = new FormData();
    formData.append('repo', repo);
    if (form) {
        const sel = form.querySelector('select[name="time_range"]');
        if (sel) formData.append('time_range', sel.value);
    }

    fetch('/api/repo-detail', { method: 'POST', body: formData })
        .then(r => r.text())
        .then(html => {
            /* Discard stale response */
            if (_pendingRepo !== repo) return;
            panel.innerHTML = html;
            panel.classList.add('open');
            initSortable();
        });
}

function _setActiveRepoRow(repo) {
    const table = document.getElementById('repo-table');
    if (!table) return;
    table.querySelectorAll('tbody tr[data-repo]').forEach(row => {
        row.classList.toggle('repo-row-active', row.dataset.repo === repo);
    });
}

function initRepoDetailToggle() {
    const table = document.getElementById('repo-table');
    if (!table || table.dataset.repoBound) return;
    table.dataset.repoBound = '1';

    table.addEventListener('click', (e) => {
        const row = e.target.closest('tr[data-repo]');
        if (!row) return;
        toggleRepoDetail(row.dataset.repo);
    });
}

/* ---- Commit Size Histogram ---- */
function initCommitSizeChart() {
    const data = readJSON('commit-size-data');
    const canvas = document.getElementById('commit-size-chart');
    if (!data || !data.buckets || !data.buckets.length || !canvas) return;
    destroyChart('commit-size');

    charts['commit-size'] = new Chart(canvas, {
        type: 'bar',
        data: {
            labels: data.buckets.map(b => b.label),
            datasets: [{
                label: 'Commits',
                data: data.buckets.map(b => b.count),
                backgroundColor: '#3b82f6',
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
}

/* ---- File Age Distribution (bar chart) ---- */
function initFileAgeChart() {
    const data = readJSON('file-age-data');
    const canvas = document.getElementById('file-age-chart');
    if (!data || !data.length || !canvas) return;
    destroyChart('file-age');

    charts['file-age'] = new Chart(canvas, {
        type: 'bar',
        data: {
            labels: data.map(b => b.label),
            datasets: [{
                label: 'Files',
                data: data.map(b => b.count),
                backgroundColor: data.map((b, i) => {
                    const palette = ['#10b981','#3b82f6','#06b6d4','#f59e0b','#f97316','#ef4444','#dc2626','#991b1b'];
                    return palette[i % palette.length];
                }),
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
}

/* ---- Init all ---- */
function initAllCharts() {
    _activeLang = null;
    _pendingLang = null;
    _activeRepo = null;
    _pendingRepo = null;
    _activeContributor = null;
    _pendingContributor = null;
    initTimeline();
    initHeatmap();
    initLanguageChart();
    initLanguageDetailToggle();
    initRepoDetailToggle();
    initContributorDetailToggle();
    initCommitSizeChart();
    initFileAgeChart();
    initSortable();
    initContribToggle();
}
document.addEventListener('DOMContentLoaded', initAllCharts);
document.body.addEventListener('htmx:afterSwap', () => setTimeout(initAllCharts, 50));

/* ---- Contributor toggle (Commits / LOC) + limit ---- */
function applyContribLimit(limit) {
    const table = document.getElementById('contributor-table');
    if (!table) return;
    const n = parseInt(limit) || 0;
    table.querySelectorAll('tbody tr').forEach((row, i) => {
        row.style.display = (n === 0 || i < n) ? '' : 'none';
    });
    /* Close contributor detail panel if the active row may have been hidden */
    if (_activeContributor) {
        toggleContributorDetail(_activeContributor);
    }
}

function initContribToggle() {
    const table = document.getElementById('contributor-table');
    if (!table) return;
    const btns = document.querySelectorAll('.contrib-toggle .toggle-btn');
    if (!btns.length) return;

    function fmt(n) {
        return n.toLocaleString('en-US');
    }

    function apply(mode) {
        const grandKey = mode === 'commits' ? 'grandCommits' : mode === 'lines' ? 'grandLines' : 'grandSurviving';
        const grand = parseFloat(table.dataset[grandKey]) || 0;
        const days = parseFloat(table.dataset.days) || 0;

        table.querySelectorAll('tbody tr').forEach(row => {
            const total = parseFloat(row.dataset[mode]) || 0;
            // Per-repo cells
            row.querySelectorAll('.contrib-val').forEach(td => {
                const v = td.dataset[mode];
                const num = v ? parseFloat(v) : 0;
                td.textContent = v ? fmt(num) : '';
                td.dataset.value = num;
            });
            // Total column
            const totalCell = row.querySelector('.contrib-total');
            if (totalCell) {
                totalCell.innerHTML = '<strong>' + fmt(total) + '</strong>';
                totalCell.dataset.value = total;
            }
            // Percentage
            const pct = grand > 0 ? total / grand * 100 : 0;
            const pctCell = row.querySelector('.contrib-pct');
            if (pctCell) {
                pctCell.textContent = grand > 0 ? pct.toFixed(1) + '%' : '';
                pctCell.dataset.value = pct;
            }
            // Avg per day
            const avg = days > 0 ? total / days : 0;
            const avgCell = row.querySelector('.contrib-avg');
            if (avgCell) {
                avgCell.textContent = days > 0 ? avg.toFixed(1) : '';
                avgCell.dataset.value = avg;
            }
        });
    }

    btns.forEach(btn => {
        if (btn.classList.contains('contrib-bound')) return;
        btn.classList.add('contrib-bound');
        btn.addEventListener('click', () => {
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            apply(btn.dataset.mode);
        });
    });

    // Initial render – respect the currently active toggle button
    const activeBtn = document.querySelector('.contrib-toggle .toggle-btn.active');
    apply(activeBtn ? activeBtn.dataset.mode : 'commits');
    // Apply initial limit from selector
    const sel = document.querySelector('.contrib-limit-select');
    if (sel) applyContribLimit(sel.value);
}

/* ---- Sortable tables ---- */
function initSortable() {
    document.querySelectorAll('table.sortable').forEach(table => {
        table.querySelectorAll('th[data-sort]').forEach((th, colIdx) => {
            if (th.classList.contains('sort-bound')) return;
            th.classList.add('sort-bound', 'sortable-th');
            th.addEventListener('click', () => {
                const tbody = table.querySelector('tbody');
                if (!tbody) return;
                const rows = Array.from(tbody.rows);
                const type = th.dataset.sort;
                const asc = th.classList.toggle('sort-asc');
                th.closest('tr').querySelectorAll('th').forEach(h => {
                    if (h !== th) { h.classList.remove('sort-asc', 'sort-desc'); }
                });
                if (!asc) th.classList.add('sort-desc'); else th.classList.remove('sort-desc');

                rows.sort((a, b) => {
                    const av = a.cells[colIdx].dataset.value ?? a.cells[colIdx].textContent.trim();
                    const bv = b.cells[colIdx].dataset.value ?? b.cells[colIdx].textContent.trim();
                    if (type === 'num') {
                        return asc
                            ? (parseFloat(av) || 0) - (parseFloat(bv) || 0)
                            : (parseFloat(bv) || 0) - (parseFloat(av) || 0);
                    }
                    return asc ? av.localeCompare(bv) : bv.localeCompare(av);
                });
                rows.forEach(r => tbody.appendChild(r));
            });
        });
    });
}

/* ---- Sidebar helpers ---- */
function selectAllRepos(checked) {
    document.querySelectorAll('input[name="repos"]').forEach(cb => { cb.checked = checked; });
    const form = document.getElementById('filter-form');
    if (form && typeof htmx !== 'undefined') htmx.trigger(form, 'change');
}

function selectDefaultRepos() {
    const data = readJSON('default-repos-data');
    if (!data) return;
    const defaults = new Set(data);
    document.querySelectorAll('input[name="repos"]').forEach(cb => {
        cb.checked = defaults.has(cb.value);
    });
    const form = document.getElementById('filter-form');
    if (form && typeof htmx !== 'undefined') htmx.trigger(form, 'change');
}
</script>
</body>
</html>
